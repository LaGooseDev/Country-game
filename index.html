<!DOCTYPE html>
<html>
<head>
    <title>Country Game</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <head>
    <meta property="og:title" content="Country Guessing Game">
    <meta property="og:description" content="Can you name all 196 countries before time runs out?">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:type" content="website">
</head>
</head>
<body>

<div id="UIContainer"></div>

    <div id="Timer">15:00</div>

    <h1>Guess All Countries</h1>

    <input id="Input" placeholder="Enter country">
    <button id="GuessButton" onclick="WaitForValue()">Guess</button>

    <p id="Message"></p>
    <button id="Restart" onclick="Restart()">RESTART</button>

    <p id="Progress">0 / 0</p>

    <script src="script.js"></script>

    <div id="MapContainer"></div>

</div>

</body>
</html>
